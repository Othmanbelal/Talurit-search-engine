services:
  - type: web
    name: tool-inventory-api
    env: node
    plan: free
    buildCommand: npm install && npm --workspace server run build
    startCommand: npm --workspace server run db:migrate:deploy && npm --workspace server run start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: CLIENT_URL
        sync: false
      - key: APP_PUBLIC_URL
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: COOKIE_NAME
        value: tool_inventory_session
      - key: SESSION_DAYS
        value: "7"
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_NAME
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: SMTP_SECURE
        value: "false"
      - key: ADMIN_SUMMARY_EMAIL
        sync: false
      - key: BACKUP_DIR
        value: /tmp/backups
      - key: UPLOAD_DIR
        value: /tmp/uploads
