# Redirect plain HTTP (if port 80 is exposed) to HTTPS on the app port 5173.
server {
  listen 80;
  server_name _;
  return 301 https://$host:5173$request_uri;
}

# HTTPS app — required so the QR camera (getUserMedia) works over the LAN.
server {
  listen 443 ssl;
  server_name _;

  ssl_certificate     /etc/nginx/certs/lan-cert.pem;
  ssl_certificate_key /etc/nginx/certs/lan-key.pem;
  ssl_protocols       TLSv1.2 TLSv1.3;

  root /usr/share/nginx/html;
  index index.html;

  location /api/ {
    proxy_pass http://server:4000/api/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /uploads/ {
    proxy_pass http://server:4000/uploads/;
    proxy_set_header Host $host;
  }

  location / {
    try_files $uri /index.html;
  }
}
