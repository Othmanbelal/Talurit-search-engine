services:
  postgres:
    image: postgres:16-alpine
    container_name: tool_inventory_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-tool_inventory}
      POSTGRES_USER: ${POSTGRES_USER:-tool_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tool_password}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tool_user} -d ${POSTGRES_DB:-tool_inventory}"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data

  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: tool_inventory_server
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 4000
      CLIENT_URL: ${CLIENT_URL:-http://localhost:5173}
      APP_PUBLIC_URL: ${APP_PUBLIC_URL:-http://localhost:5173}
      DATABASE_URL: postgresql://${POSTGRES_USER:-tool_user}:${POSTGRES_PASSWORD:-tool_password}@postgres:5432/${POSTGRES_DB:-tool_inventory}
      SESSION_SECRET: ${SESSION_SECRET:-change_me_long_random_secret}
      COOKIE_NAME: ${COOKIE_NAME:-tool_inventory_session}
      SESSION_DAYS: ${SESSION_DAYS:-7}
      PASSWORD_RESET_MINUTES: ${PASSWORD_RESET_MINUTES:-30}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      ADMIN_NAME: ${ADMIN_NAME:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      ADMIN_SUMMARY_EMAIL: ${ADMIN_SUMMARY_EMAIL:-}
      BACKUP_DIR: /app/backups
      UPLOAD_DIR: /app/uploads
      STORAGE_DRIVER: ${STORAGE_DRIVER:-local}
      SUPABASE_URL: ${SUPABASE_URL:-}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-}
      SUPABASE_STORAGE_BUCKET: ${SUPABASE_STORAGE_BUCKET:-tool-inventory-uploads}
      SUPABASE_SIGNED_URL_SECONDS: ${SUPABASE_SIGNED_URL_SECONDS:-3600}
    volumes:
      - "${BACKUP_HOST_DIR:-./backups}:/app/backups"
      - "${UPLOAD_HOST_DIR:-./uploads}:/app/uploads"
    command: sh -c "npm --workspace server run db:migrate:deploy && npm --workspace server run start"

  client:
    build:
      context: .
      dockerfile: client/Dockerfile
    container_name: tool_inventory_client
    restart: unless-stopped
    depends_on:
      - server
    ports:
      - "${CLIENT_PORT:-5173}:80"

volumes:
  postgres_data:
